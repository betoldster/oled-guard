<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Monitor body -->
  <rect x="14" y="16" width="100" height="72" rx="6" ry="6" fill="#1a1a2e" stroke="#3a3a5c" stroke-width="3"/>
  <!-- Screen -->
  <rect x="20" y="22" width="88" height="60" rx="3" ry="3" fill="#0a0a0a"/>
  <!-- Shield on screen -->
  <path d="M64 34 C64 34 46 38 46 38 C46 38 46 56 46 60 C46 70 64 78 64 78 C64 78 82 70 82 60 C82 56 82 38 82 38 Z"
        fill="none" stroke="#4fc3f7" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Inner shield glow -->
  <path d="M64 40 C64 40 51 43 51 43 C51 43 51 57 51 60 C51 67 64 73 64 73 C64 73 77 67 77 60 C77 57 77 43 77 43 Z"
        fill="#4fc3f7" fill-opacity="0.15"/>
  <!-- Checkmark inside shield -->
  <polyline points="55,56 61,64 73,48" fill="none" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Monitor stand -->
  <rect x="52" y="88" width="24" height="6" rx="2" ry="2" fill="#3a3a5c"/>
  <!-- Monitor base -->
  <rect x="40" y="94" width="48" height="5" rx="2.5" ry="2.5" fill="#3a3a5c"/>
</svg>
